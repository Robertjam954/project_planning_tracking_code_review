name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    if: >
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this pull request for correctness and adherence to the repo's
            CLAUDE.md conventions. Use `git diff` against the PR base branch to
            see the changes. Pay special attention to: error handling and silent failures, input validation, secrets handling, and test coverage for new logic.
            Keep feedback concise and actionable; skip nitpicks.
          claude_args: |
            --model claude-sonnet-5
            --max-turns 12
