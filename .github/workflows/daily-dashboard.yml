name: Daily progress dashboard

on:
  schedule:
    # 07:00 UTC every day - records a snapshot and refreshes the board.
    - cron: "0 7 * * *"
  push:
    branches: [main]
    paths:
      - "todos/**"
      - "projects.json"
      - "scripts/build_dashboard.py"
      - "docs/**"
      - ".github/workflows/daily-dashboard.yml"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build dashboard + record daily snapshot
        run: python scripts/build_dashboard.py

      - name: Commit refreshed dashboard and history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html data/history.json
          if git diff --cached --quiet; then
            echo "No dashboard changes today."
          else
            git commit -m "chore: daily progress snapshot [skip ci]"
            git push
          fi

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
